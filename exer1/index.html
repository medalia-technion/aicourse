<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Exercise 1</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: Arial, sans-serif;
      text-align: center;
    }

    nav {
      background-color: #333;
      display: flex;
      justify-content: center;
    }

    nav a {
      color: white;
      text-decoration: none;
      padding: 16px 24px;
      display: block;
      font-size: 1rem;
      transition: background-color 0.2s;
    }

    nav a:hover {
      background-color: #555;
    }

    main {
      padding: 60px 20px;
    }

    h1 {
      color: red;
      font-size: 4rem;
      font-weight: bold;
    }

    .globe {
      margin-top: 40px;
    }

    .globe img {
      width: 240px;
      height: 240px;
    }
  </style>
</head>
<body>

  <nav>
    <a href="#">Home</a>
    <a href="#">About</a>
    <a href="#">Contact</a>
  </nav>

  <main>
    <h1>hi there</h1>
<h2>hello world</h2>
   
  </main>

</body>
</html>
